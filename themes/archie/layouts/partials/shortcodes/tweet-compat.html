{{- $id := .Get "id" | default (.Get 0) -}}
{{- $user := .Get "user" -}}
{{- if $id -}}
<blockquote class="twitter-tweet">
  <a href="https://twitter.com/{{ if $user }}{{ $user }}/status/{{ end }}{{ $id }}">View post</a>
</blockquote>
<script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
{{- end -}}
